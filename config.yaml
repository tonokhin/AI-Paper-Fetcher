tracks:
  ai:
    topics:
      - llm_evaluation
      - ai_agents
      - interpretability
      - rag_and_grounding
      - multimodal_reasoning
      - llm_training_and_alignment
      - ai_security

  fundamentals:
    topics:
      - algorithms
      - mathematics_for_ai

topics:
  llm_evaluation:
    query: "LLM evaluation"
    include_keywords:
      - benchmark
      - evaluation
      - reasoning
    exclude_keywords:
      - survey
    categories:
      - cs.CL
      - cs.AI
      - cs.LG

  ai_agents:
    query: "AI agents"
    include_keywords:
      - agent
      - tool use
      - planning
    exclude_keywords: []
    categories:
      - cs.AI
      - cs.LG

  interpretability:
    query: "AI interpretability"
    include_keywords:
      - interpretability
      - explanation
      - mechanistic
    exclude_keywords:
      - survey
    categories:
      - cs.AI
      - cs.LG
      - cs.CL

  rag_and_grounding:
    query: "retrieval augmented generation grounding"
    include_keywords:
      - retrieval
      - grounding
      - RAG
      - hallucination
      - factuality
    exclude_keywords:
      - survey
    categories:
      - cs.CL
      - cs.AI
      - cs.IR
      - cs.LG

  multimodal_reasoning:
    query: "multimodal reasoning vision language model"
    include_keywords:
      - multimodal
      - vision-language
      - reasoning
      - benchmark
    exclude_keywords:
      - survey
    categories:
      - cs.CV
      - cs.CL
      - cs.AI
      - cs.LG

  llm_training_and_alignment:
    query: "language model post-training alignment reinforcement learning preference optimization"
    include_keywords:
      - post-training
      - alignment
      - reinforcement learning
      - preference
      - instruction tuning
    exclude_keywords:
      - survey
    categories:
      - cs.CL
      - cs.AI
      - cs.LG

  ai_security:
    query: "AI agent security prompt injection tool use"
    include_keywords:
      - security
      - prompt injection
      - agent
      - tool use
      - sandbox
    exclude_keywords:
      - survey
    categories:
      - cs.CR
      - cs.AI
      - cs.CL
      - cs.SE

  algorithms:
    query: "algorithm"
    include_keywords:
      - algorithm
      - optimization
      - complexity
      - learning
    exclude_keywords:
      - survey
    categories:
      - cs.DS
      - cs.CC
      - cs.LG
      - math.OC

  mathematics_for_ai:
    query: "optimization"
    include_keywords:
      - optimization
      - probability
      - theorem
      - convergence
      - learning
    exclude_keywords:
      - survey
    categories:
      - math.OC
      - math.ST
      - stat.ML
      - cs.LG
